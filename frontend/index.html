<!DOCTYPE html>
<html>
<head>
    <title>Finance Agent</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Finance Agent</h1>

    <!-- Upload -->
    <div>
        <input type="file" id="fileInput">
        <button onclick="uploadFile()">Upload CSV</button>
    </div>

    <!-- Report -->
    <div id="report">
        <h2>Report</h2>
        <pre id="reportOutput"></pre>
    </div>

    <!-- Chat -->
    <div>
        <h2>Chat</h2>
        <input type="text" id="chatInput" placeholder="Ask something...">
        <button onclick="sendMessage()">Send</button>
        <pre id="chatOutput"></pre>
    </div>

    <script src="app.js"></script>
</body>
</html>
